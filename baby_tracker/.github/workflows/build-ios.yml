name: Build iOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: baby_tracker
        run: flutter pub get

      - name: Run tests
        working-directory: baby_tracker
        run: flutter test --no-pub || true

      - name: Build iOS (No Codesign)
        working-directory: baby_tracker
        run: flutter build ios --release --no-codesign

      - name: Create IPA directory
        run: mkdir -p baby_tracker/build/ios/ipa

      - name: Create unsigned IPA
        working-directory: baby_tracker
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/baby_tracker.ipa Payload
          rm -rf Payload

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: baby_tracker/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: baby_tracker/build/ios/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
