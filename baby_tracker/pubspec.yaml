name: baby_tracker
description: Little Atlas - A beautiful baby growth tracking app to record precious moments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  photo_manager: ^3.0.0
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1
  uuid: ^4.3.3
  sqflite: ^2.3.2
  permission_handler: ^11.3.0
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  # fonts:
  #   - family: BabyFont
  #     fonts:
  #       - asset: assets/fonts/BabyFont.ttf
